<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="demo" style="text-align: center;">JAVASCRIPT PATTERN CODE</h1>
    
    

    <script>
    let n = 5;
    let i,j,k;
// 1. Simple Pyramid
console.log("Simple Pyramid");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=i;j++){
        row += "* ";
    }
    console.log(row);
}


// 2. Flipped Simple Pyramid

console.log("\nFlipped Simple Pyramid");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=i;k++){
        row+="*";
    }
    console.log(row);
}



// 3. Inverted Pyramid
console.log("\nInverted Pyramid");
for(i=n;i>=1;i--){
    let row="";
    for(j=1;j<=i;j++){
        row+="* ";
    }
    console.log(row);
}


// 4. Flipped Inverted Pyramid

console.log("\nFlipped Inverted Pyramid");
for(i=n;i>=1;i--){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=i;k++){
        row+="*";
    }
    console.log(row);
}


// 5. Triangle

console.log("\nTriangle");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=2*i-1;k++){
        row+="*";
    }
    console.log(row);
}



// 6. Inverted Triangle

console.log("\nInverted Triangle");
for(i=n;i>=1;i--){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=2*i-1;k++){
        row+="*";
    }
    console.log(row);
}



// 7. Half Diamond Pattern

console.log("\nHalf Diamond Pattern");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=i;j++){
        row+="*";
    }
    console.log(row);
}
for(i=n-1;i>=1;i--){
    let row="";
    for(j=1;j<=i;j++){
        row+="*";
    }
    console.log(row);
}


// 8. Flipped Half Diamond
console.log("\nFlipped Half Diamond Pattern");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=i;k++){
        row+="*";
    }
    console.log(row);
}
for(i=n-1;i>=1;i--){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=i;k++){
        row+="*";
    }
    console.log(row);
}

// 9. Diamond Pattern
console.log("\nDiamond Pattern");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=2*i-1;k++){
        row+="*";
    }
    console.log(row);
}
for(i=n-1;i>=1;i--){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=2*i-1;k++){
        row+="*";
    }
    console.log(row);
}

// 10. Hourglass Pattern
console.log("\nHourglass Pattern");
for(i=n;i>=1;i--){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=2*i-1;k++){
        row+="*";
    }
    console.log(row);
}
for(i=2;i<=n;i++){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=2*i-1;k++){
        row+="*";
    }
    console.log(row);
}

// 11. Number Pyramid
console.log("\nNumber Pyramid");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=i;j++){
        row+=i+" ";
    }
    console.log(row);
}



// 12. Rotated Number Pyramid
console.log("\nRotated Number Pyramid");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=1;k<=i;k++){
        row+=(i+k-1)+" ";
    }
    console.log(row);
}



// 13. Palindrome Triangle
console.log("\nPalindrome Triangle");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=n-i;j++){
        row+=" ";
    }
    for(k=i;k>=1;k--){
        row+=k;
    }
    for(k=2;k<=i;k++){
        row+=k;
    }
    console.log(row);
}


// 14. Alphabet Pyramid
console.log("\nAlphabet Pyramid");
for(i=1;i<=n;i++){
    let row="";
    let ch=String.fromCharCode(64+i);
    for(j=1;j<=i;j++){
        row+=ch+" ";
    }
    console.log(row);
}


// 15. Continuous Alphabet Pyramid
console.log("\nContinuous Alphabet Pyramid");
let ch=65;
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=i;j++){
        row+=String.fromCharCode(ch)+" ";
        ch++;
    }
    console.log(row);
}


// 16. Number Triangle
console.log("\nNumber Triangle");
for(i=1;i<=n;i++){
    let row="";
    for(j=1;j<=i;j++){
        row+=j+" ";
    }
    console.log(row);
}

</script>
</body>
</html>
