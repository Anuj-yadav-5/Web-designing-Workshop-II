<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Salary Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Employee Salary Management System</h1>

      <input type="text" id="Name" placeholder="Employee Name" />
      <input type="text" id="empId" placeholder="Employee ID" />
      <input type="number" id="Salary" placeholder="Salary" />
      <input type="text" id="Dept" placeholder="Department" />

      
      <button onclick="addEmployee()">Add Employee</button>

    
      <button  onclick="displayAll()">Display All</button>
      <button  onclick="filterSalary()">Salary &gt; 50000</button>
      <button  onclick="totalSalary()">Total Salary</button>
      <button  onclick="averageSalary()">Average Salary</button>
      <button  onclick="countByDept()">Count by Department</button>

    <div id="output"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
